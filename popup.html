<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <header>
      <div class="logo-icon">⚰️</div>
      <h1>TAB <span class="accent">GRAVEYARD</span></h1>
      <p class="tagline">Rest in peace, RAM usage.</p>
    </header>

    <main>
    <div class="stats-box" id="stats-trigger">
    <span id="tab-count">0</span>
    <label>Inactive Tabs (Click to view)</label>
    </div>

    <div id="tab-list-container" class="hidden">
    <ul id="tab-list"></ul>
    </div>

    <button id="clean-tabs" class="main-btn">Bury the Dead</button>
    </main>

    <footer>
  <p>
    Protected: 
    <span class="site-tag">YouTube</span> 
    <span class="site-tag">GitHub</span> 
    <span class="site-tag">Google</span>
    <span class="site-tag">WhatsApp</span>
  </p>
</footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
